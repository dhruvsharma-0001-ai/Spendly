{% extends "base.html" %}

{% block title %}Edit Expense - Spendly{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h1 class="auth-title">Edit Expense</h1>
            <p class="auth-subtitle">Update your spending details</p>
        </div>

        <form action="{{ url_for('edit_expense', id=expense.id) }}" method="POST" class="auth-form">
            <div class="form-group">
                <label for="amount" class="form-label">Amount (₹)</label>
                <input type="number" id="amount" name="amount" step="0.01" min="0.01" required value="{{ expense.amount }}" class="form-input">
            </div>

            <div class="form-group">
                <label for="category" class="form-label">Category</label>
                <select id="category" name="category" required class="form-input">
                    <option value="Food" {{ 'selected' if expense.category == 'Food' }}>Food</option>
                    <option value="Bills" {{ 'selected' if expense.category == 'Bills' }}>Bills</option>
                    <option value="Transport" {{ 'selected' if expense.category == 'Transport' }}>Transport</option>
                    <option value="Health" {{ 'selected' if expense.category == 'Health' }}>Health</option>
                    <option value="Shopping" {{ 'selected' if expense.category == 'Shopping' }}>Shopping</option>
                    <option value="Entertainment" {{ 'selected' if expense.category == 'Entertainment' }}>Entertainment</option>
                    <option value="Other" {{ 'selected' if expense.category == 'Other' }}>Other</option>
                </select>
            </div>

            <div class="form-group">
                <label for="date" class="form-label">Date</label>
                <input type="date" id="date" name="date" required value="{{ expense.date }}" class="form-input">
            </div>

            <div class="form-group">
                <label for="description" class="form-label">Description (Optional)</label>
                <input type="text" id="description" name="description" value="{{ expense.description or '' }}" placeholder="e.g., Weekly groceries" class="form-input">
            </div>

            <button type="submit" class="btn btn-primary btn-full">
                <span>Save Changes</span>
                <i data-lucide="save"></i>
            </button>
            
            <a href="{{ url_for('expenses') }}" class="btn btn-ghost btn-full" style="margin-top: 1rem;">
                Cancel
            </a>
        </form>

        <form action="{{ url_for('delete_expense_route', id=expense.id) }}" method="POST" style="margin-top: 1rem;" onsubmit="return confirm('Are you sure you want to delete this expense?');">
            <button type="submit" class="btn btn-ghost btn-full" style="color: var(--danger); border-color: var(--danger); display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
                <i data-lucide="trash-2" style="width: 18px; height: 18px;"></i>
                <span>Delete Expense</span>
            </button>
        </form>
    </div>
</div>
{% endblock %}
